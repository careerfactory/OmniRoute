# OmniRoute — endpoint-aware model routing via njs
#
# Requires: libnginx-mod-http-js (njs)
# Install:  sudo apt-get install -y libnginx-mod-http-js
#
# njs script: /etc/nginx/njs/endpoint_routing.js
# This config: /etc/nginx/sites-enabled/omnirouter.conf

js_import njs/endpoint_routing.js;
js_var    $route_model;

server {
    server_name route.smartaipack.ru;

    # ── Endpoint-aware API routing ─────────────────────────────────
    # /v1/responses        → model prefix "main/" → KFC (responses)
    # /v1/chat/completions → model prefix "old/"  → KFC-Old (chat)
    #
    # The njs handler reads body.model, rewrites the prefix,
    # stores it in $route_model, and does an internal redirect
    # to /_omni_proxy/... which proxies to OmniRoute with
    # X-Route-Model header set.

    location = /v1/responses {
        # Buffer request body so njs can read it
        client_body_in_single_buffer on;
        client_body_buffer_size 10m;
        client_max_body_size 100m;

        js_content endpoint_routing.handleRequest;
    }

    location = /v1/chat/completions {
        client_body_in_single_buffer on;
        client_body_buffer_size 10m;
        client_max_body_size 100m;

        js_content endpoint_routing.handleRequest;
    }

    # ── Internal proxy to OmniRoute API (port 20131) ──────────────
    # Receives internal redirects from njs handlers above.
    # Forwards the original request body + adds X-Route-Model header.
    location /_omni_proxy/ {
        internal;

        # Strip the /_omni_proxy prefix, forward original path
        rewrite ^/_omni_proxy(/.*)$ $1 break;

        # Set the rewritten model header (empty string = no override)
        proxy_set_header X-Route-Model $route_model;

        proxy_pass http://127.0.0.1:20131;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE streaming: disable buffering
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400;

        # CORS
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, Origin, User-Agent, X-Requested-With' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length, Content-Range' always;
    }

    # ── Other /v1/* API routes (no model rewrite needed) ──────────
    location /v1 {
        proxy_pass http://127.0.0.1:20131;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400;

        # CORS
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, Origin, User-Agent, X-Requested-With' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length, Content-Range' always;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH';
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, Origin, User-Agent, X-Requested-With';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # ── Dashboard (port 20130) ────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:20130;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/route.smartaipack.ru/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/route.smartaipack.ru/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

# ── Dozzle Logs ───────────────────────────────────────────────────
server {
    server_name logs.smartaipack.ru;

    location / {
        proxy_pass http://127.0.0.1:9999;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/route.smartaipack.ru/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/route.smartaipack.ru/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

# ── HTTP → HTTPS redirects ───────────────────────────────────────
server {
    if ($host = route.smartaipack.ru) {
        return 301 https://$host$request_uri;
    } # managed by Certbot
    listen 80;
    server_name route.smartaipack.ru;
    return 404; # managed by Certbot
}

server {
    if ($host = logs.smartaipack.ru) {
        return 301 https://$host$request_uri;
    } # managed by Certbot
    listen 80;
    server_name logs.smartaipack.ru;
    return 404; # managed by Certbot
}
